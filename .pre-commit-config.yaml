# Pre-commit hook configuration.
# This file is NOT installed yet (no git repo in Phase 0).
# To install after git init: pre-commit install
#
# Manual run without git: pre-commit run --all-files

repos:
  # ── Python: ruff (lint + import sort) ───────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ── Python: black (formatter) ────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.12
        files: ^backend/

  # ── Python: mypy (type checker) ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^backend/src/
        args: [--config-file=backend/pyproject.toml]
        additional_dependencies:
          - pydantic==2.10.3
          - pydantic-settings==2.7.0
          - fastapi==0.115.5
          - sqlalchemy[asyncio]==2.0.36
          - types-redis==4.6.0.20241004

  # ── Frontend: prettier (Phase 7+) ────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/
        types_or: [ts, tsx, json, css, markdown]
        # Only active after Phase 7 frontend scaffold exists.

  # ── General: trailing whitespace + end-of-file newline ───────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
